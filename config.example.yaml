# ═══════════════════════════════════════════════════════════════
# FILTERING
# ═══════════════════════════════════════════════════════════════
filters:
  bad_words:
    - "polygraph"
    - "top secret"
    - "ts/sci"
    - "security clearance required"
    - "registered nurse"
    - "clinical trial"
    - "patient care"
    - "pharmacy technician"
    - "physician assistant"
    - "veterinary"
    - "CPA required"
    - "CFA required"
    - "bar admission"
    - "law degree required"
    - "JD required"
    - "medical degree"
    - "must be a US citizen"
    - "US citizens only"

  blacklisted_companies:
    - "Revature"

  bad_title_words:
    - "Intern"
    - "Internship"
    - "Junior"
    - "Cashier"
    - "Teller"
    - "Nurse"
    - "Physician"
    - "Teacher"
    - "Chef"
    - "Driver"
    - "Warehouse"
    - "Receptionist"
    - "Insurance Agent"
    - "CFO"
    - "Chief Financial Officer"
    - "Chief Risk Officer"

  experience_buffer: 3

  visa_sponsorship_only: false

  visa_positive_keywords:
    - "visa sponsorship"
    - "sponsor visa"
    - "sponsorship available"
    - "will sponsor"
    - "H1B"
    - "H-1B"
    - "work visa"
    - "immigration sponsorship"
    - "Tier 2"
    - "Skilled Worker visa"

  visa_negative_keywords:
    - "no sponsorship"
    - "not sponsor"
    - "cannot sponsor"
    - "won't sponsor"
    - "will not sponsor"
    - "no visa"
    - "must be authorized"
    - "citizens only"

# ═══════════════════════════════════════════════════════════════
# RESUME
# ═══════════════════════════════════════════════════════════════
resume:
  default_resume_path: ""

# ═══════════════════════════════════════════════════════════════
# SCHEDULING
# ═══════════════════════════════════════════════════════════════
scheduling:
  scan_interval_minutes: 10
  max_applies_per_day: 40
  max_applies_per_cycle: 15
  active_hours_start: 0
  active_hours_end: 24
  min_delay_between_jobs: 3
  max_delay_between_jobs: 8
  min_delay_between_searches: 5
  max_delay_between_searches: 15
  delay_after_apply: 4

# ═══════════════════════════════════════════════════════════════
# BROWSER
# ═══════════════════════════════════════════════════════════════
browser:
  headless: false
  stealth_mode: true
  chrome_version: 146
  window_width: 1280
  window_height: 900
  user_data_dir: ""
  follow_company: false

# ═══════════════════════════════════════════════════════════════
# DATA EXPORT
# ═══════════════════════════════════════════════════════════════
export:
  auto_export_csv: true
  export_dir: "data"
  applied_csv: "applied_jobs.csv"
  skipped_csv: "skipped_jobs.csv"
  recruiters_csv: "recruiters.csv"
  visa_sponsors_csv: "visa_sponsors.csv"

# ═══════════════════════════════════════════════════════════════
# AI — LM Studio primary, Ollama 7B fallback
# ═══════════════════════════════════════════════════════════════
ai:
  enabled: true

  provider: "lmstudio"
  model: "qwen3.5-9b"
  base_url: "http://localhost:1234/v1"
  api_key: ""

  fallback_enabled: true
  fallback_provider: "ollama"
  fallback_model: "llama3.1"
  fallback_base_url: "http://localhost:11434/v1"

  temperature: 0.2
  max_tokens: 200
  timeout_seconds: 30

  cv_text: |
    ANKIT KUMAR — Manager, Financial Services Risk Management, Ernst & Young LLP, Gurugram.
    EXPERIENCE (7+ years):
    EY (Aug 2021–Present): Manager FSRM. Led credit-risk transformation — Concentration Risk, Capital Adequacy, RWA. BRDs for UK/EU regulatory platforms. Tableau dashboards. Basel III/IRB training.
    KPMG (Jan–Jul 2021): Consultant DTI Oracle. Basel III RCA3 for PSU bank. OFSAA validation, SQL testing.
    Stradegi Solutions (Jun 2020–Jan 2021): Business Analyst. BRDs, functional specs, UI, UAT.
    Equitas SFB (Apr 2018–Jun 2020): Business Analyst. Predictive modelling (SPSS, 96% accuracy). RBI regulatory analysis, stress testing.
    EDUCATION: PGDM Data Science (IFMR/Krea 2018), B.Tech Mech Eng (ABIT/BPUT 2015).
    SKILLS: OFSAA, Basel III, IRB, Credit Risk, PD/LGD/EAD, RWA, Python, SQL, R, Tableau, SPSS, Agile, JIRA.
    CERTS: ScrumMaster, Lean Six Sigma Green Belt, IBM SPSS, Bloomberg.
    Open to: UK, Singapore, Canada, UAE, Australia, Hong Kong, Germany.

logging:
  level: "INFO"
  log_to_file: true
  log_dir: "logs"

# ═══════════════════════════════════════════════════════════════
# MATCH SCORING — AI scores job-candidate fit before applying
# ═══════════════════════════════════════════════════════════════
match_scoring:
  enabled: true
  minimum_score: 70            # Only apply to jobs scoring above this (0-100)
  score_in_csv: true           # Include match scores in CSV exports

# ═══════════════════════════════════════════════════════════════
# RESUME TAILORING — AI generates custom resume per job
# ═══════════════════════════════════════════════════════════════
resume_tailoring:
  enabled: true
  master_resume_path: ""       # Path to master resume (PDF/DOCX/TXT)
  master_resume_text: ""       # Or paste resume text here (overrides file)
  output_dir: "data/tailored_resumes"
  format: "pdf"                # pdf, docx, or txt
  template_style: "professional"  # professional, modern, minimal

# ═══════════════════════════════════════════════════════════════
# RECRUITER MESSAGING — Auto-message recruiters after applying
# ═══════════════════════════════════════════════════════════════
recruiter_messaging:
  enabled: true
  delay_minutes: 120           # Wait N minutes after applying before messaging
  max_messages_per_day: 10
  message_template: ""         # Custom template (use {recruiter_name}, {job_title}, {company})
  skip_if_no_profile_url: true

# ═══════════════════════════════════════════════════════════════
# EXTERNAL APPLY — Fill ATS forms (Greenhouse, Lever, Workday)
# ═══════════════════════════════════════════════════════════════
external_apply:
  enabled: true
  supported_ats:
    - "greenhouse"
    - "lever"
    - "workday"
    - "ashby"
  max_external_per_cycle: 5
  timeout_seconds: 120

# ═══════════════════════════════════════════════════════════════
# GOOGLE JOBS — Scrape Google Jobs for additional job discovery
# ═══════════════════════════════════════════════════════════════
google_jobs:
  enabled: true
  use_serpapi: false            # Use SerpAPI for structured data (paid)
  serpapi_key: ""
  scrape_interval_minutes: 30
  max_results_per_query: 50
  search_queries: []            # Auto-generates from search terms if empty
  country_code: "uk"
  date_posted: "today"          # today, 3days, week, month
  deduplicate_with_linkedin: true

# ═══════════════════════════════════════════════════════════════
# DASHBOARD — Real-time monitoring web dashboard
# ═══════════════════════════════════════════════════════════════
dashboard:
  enabled: true
  port: 5000
  host: "0.0.0.0"
  refresh_interval: 30          # Auto-refresh interval in seconds

# ═══════════════════════════════════════════════════════════════
# ALERTS — Telegram, Discord, Slack notifications
# ═══════════════════════════════════════════════════════════════
alerts:
  enabled: false
  telegram:
    enabled: false
    bot_token: ""               # Get from @BotFather on Telegram
    chat_id: ""                 # Your chat/group ID
  discord:
    enabled: false
    webhook_url: ""             # Discord webhook URL
  slack:
    enabled: false
    webhook_url: ""             # Slack incoming webhook URL
  on_apply: true
  on_error: true
  daily_summary: true
  daily_summary_time: "22:00"

# ═══════════════════════════════════════════════════════════════
# ACTIVITY SIMULATION — Look human between apply cycles
# ═══════════════════════════════════════════════════════════════
activity_simulation:
  enabled: true
  actions_per_cycle: 5          # Number of random actions (or "3-7" for range)
  view_profiles: true
  like_posts: true
  scroll_feed: true

# ═══════════════════════════════════════════════════════════════
# SALARY INTELLIGENCE — Aggregate and benchmark salary data
# ═══════════════════════════════════════════════════════════════
salary_intelligence:
  enabled: true
  export_csv: true

# ═══════════════════════════════════════════════════════════════
# INTERVIEW PREP — Auto-generate prep after applying
# ═══════════════════════════════════════════════════════════════
interview_prep:
  enabled: true
  auto_generate: true

# ═══════════════════════════════════════════════════════════════
# SUCCESS TRACKING — Track response rates and correlations
# ═══════════════════════════════════════════════════════════════
success_tracking:
  enabled: true

# ═══════════════════════════════════════════════════════════════
# SMART SCHEDULING — Prioritize fast-hiring companies
# ═══════════════════════════════════════════════════════════════
smart_scheduling:
  enabled: true
  prioritize_fast_hiring: true

# ═══════════════════════════════════════════════════════════════
# MULTI-PLATFORM — Support for Indeed, Glassdoor, etc.
# ═══════════════════════════════════════════════════════════════
multi_platform:
  enabled: false
  platforms:
    - "linkedin"
    # - "indeed"
    # - "glassdoor"

# ═══════════════════════════════════════════════════════════════
# PROXY — Proxy rotation and multi-profile
# ═══════════════════════════════════════════════════════════════
proxy:
  enabled: false
  proxy_list: []               # ["http://ip:port", "socks5://ip:port"]
  proxy_file: ""               # Path to proxy list file (one per line)
  rotate_per_session: true
  profiles_dir: "data/profiles"

# ═══════════════════════════════════════════════════════════════
# DOCKER — Container deployment settings
# ═══════════════════════════════════════════════════════════════
docker:
  health_check_port: 8080

# ═══════════════════════════════════════════════════════════════
# FOLLOW-UP ENGINE — Multi-touch follow-up cadence
# ═══════════════════════════════════════════════════════════════
follow_up:
  enabled: true
  max_touches: 3                 # Max follow-up messages per recruiter
  max_follow_ups_per_day: 5
  skip_if_responded: true        # Skip follow-up if already got a response
  cadence:
    - { touch: 2, days: 5, type: "follow_up_1" }
    - { touch: 3, days: 14, type: "final_follow_up" }

# ═══════════════════════════════════════════════════════════════
# NETWORK LEVERAGE — Check connections, surface referrals
# ═══════════════════════════════════════════════════════════════
network_leverage:
  enabled: true
  check_connections: true        # Check for 1st/2nd degree connections at companies
  send_connection_requests: false # Auto-send connection requests to hiring managers
  max_requests_per_day: 10
  request_note_enabled: true     # Include a note with connection requests

# ═══════════════════════════════════════════════════════════════
# RESUME A/B TESTING — Generate variants, track callbacks
# ═══════════════════════════════════════════════════════════════
resume_ab_testing:
  enabled: true
  variants_per_job: 2            # Number of variants to generate
  styles:                        # Resume styles to test
    - "skills_first"
    - "achievement_focused"
    - "narrative"

# ═══════════════════════════════════════════════════════════════
# COVER LETTER — PDF cover letter generation per job
# ═══════════════════════════════════════════════════════════════
cover_letter:
  enabled: true
  output_dir: "data/cover_letters"
  tone: "professional"           # professional, conversational, enthusiastic
  length: "medium"               # short, medium, full

# ═══════════════════════════════════════════════════════════════
# SKILL GAP ANALYSIS — Aggregate skills, identify gaps
# ═══════════════════════════════════════════════════════════════
skill_gap_analysis:
  enabled: true
  auto_extract: true             # Use AI to extract skills from JDs

# ═══════════════════════════════════════════════════════════════
# COMPANY INTELLIGENCE — Glassdoor ratings, enrichment
# ═══════════════════════════════════════════════════════════════
company_intel:
  enabled: true
  min_glassdoor_rating: 0        # Skip companies below this rating (0 = disabled)
  enrich_from_description: true  # Extract company info from JD via AI
  cache_days: 30

# ═══════════════════════════════════════════════════════════════
# APPLY TIMING — Prioritize fresh job postings
# ═══════════════════════════════════════════════════════════════
apply_timing:
  enabled: true
  prioritize_fresh: true         # Reorder job queue by freshness
  skip_stale: false              # Skip very old postings
  stale_threshold_hours: 168     # 7 days
  max_age_hours: 168

# ═══════════════════════════════════════════════════════════════
# EMAIL MONITOR — Track responses via IMAP
# ═══════════════════════════════════════════════════════════════
email_monitor:
  enabled: false
  imap_server: ""                # Auto-detected from email domain
  imap_port: 993
  email: ""                      # Defaults to personal.email
  password: ""                   # App password (not your main password)
  folder: "INBOX"
  check_last_days: 7

# ═══════════════════════════════════════════════════════════════
# PROFILE OPTIMIZER — LinkedIn keyword analysis
# ═══════════════════════════════════════════════════════════════
profile_optimizer:
  enabled: true
  auto_suggest: true
  min_jobs_for_analysis: 10      # Minimum jobs before generating suggestions

# ═══════════════════════════════════════════════════════════════
# FINGERPRINT ROTATION — Browser anti-detection
# ═══════════════════════════════════════════════════════════════
fingerprint:
  enabled: false
  rotate_user_agent: true
  rotate_resolution: true
  spoof_webgl: true
  spoof_canvas: true
  region: "us"                   # us, uk, eu, india, singapore, uae, canada, australia

# ═══════════════════════════════════════════════════════════════
# APPLICATION WITHDRAWAL — Auto-withdraw when you get an offer
# ═══════════════════════════════════════════════════════════════
application_withdrawal:
  enabled: true
  auto_withdraw_on_offer: true   # Withdraw all pending apps when offer received
  max_withdrawals_per_day: 10

# ═══════════════════════════════════════════════════════════════
# DUPLICATE DETECTION — Cross-platform dedup
# ═══════════════════════════════════════════════════════════════
dedup:
  enabled: true
  fuzzy_threshold: 0.85          # Similarity threshold for fuzzy matching

# ═══════════════════════════════════════════════════════════════
# JD CHANGE TRACKING — Detect job description edits
# ═══════════════════════════════════════════════════════════════
jd_tracking:
  enabled: true
  check_interval_hours: 24       # How often to re-check applied job descriptions
  alert_on_change: true

# ═══════════════════════════════════════════════════════════════
# RECRUITER CRM — Relationship scoring and tracking
# ═══════════════════════════════════════════════════════════════
recruiter_crm:
  enabled: true
  auto_log_interactions: true    # Automatically log applies, messages, follow-ups
  prioritize_warm_contacts: true

# ═══════════════════════════════════════════════════════════════
# APPLY SCHEDULER — Time-of-day optimized application queue
# ═══════════════════════════════════════════════════════════════
apply_scheduler:
  enabled: false                 # Disabled by default (applies immediately by default)
  optimal_hours: [7, 8, 9, 10]  # Best hours to submit (local time of job location)
  timezone_detection: true
  queue_max_age_hours: 48        # Expire queued jobs after this

# ═══════════════════════════════════════════════════════════════
# SALARY NEGOTIATION — Auto-generate negotiation briefs
# ═══════════════════════════════════════════════════════════════
salary_negotiation:
  enabled: true
  auto_generate_on_interview: true  # Generate brief when interview detected
  current_salary: ""             # Your current salary for leverage calculations

# ═══════════════════════════════════════════════════════════════
# ATS STATUS SCRAPER — Check application portal statuses
# ═══════════════════════════════════════════════════════════════
ats_status_scraper:
  enabled: true
  check_interval_hours: 48       # How often to re-check ATS portals
  max_checks_per_cycle: 5

# ═══════════════════════════════════════════════════════════════
# JOB WATCHLIST — Bookmark jobs for later
# ═══════════════════════════════════════════════════════════════
job_watchlist:
  enabled: true
  default_remind_days: 3         # Default reminder interval
  auto_expire_inactive: true     # Mark closed listings as expired

# ═══════════════════════════════════════════════════════════════
# REFERRAL AUTOMATOR — Auto-draft referral request messages
# ═══════════════════════════════════════════════════════════════
referral_automator:
  enabled: true
  auto_send: false               # If true, sends automatically; if false, drafts only
  max_requests_per_day: 5

# ═══════════════════════════════════════════════════════════════
# MULTI-LANGUAGE — Resume/cover letter translation
# ═══════════════════════════════════════════════════════════════
multi_language:
  enabled: true
  auto_detect: true              # Auto-detect JD language
  supported_languages:
    - "english"
    - "german"
    - "french"
    - "spanish"
    - "portuguese"
    - "dutch"
    - "arabic"
    - "hindi"
    - "japanese"
    - "mandarin"

# ═══════════════════════════════════════════════════════════════
# CHECKPOINT — Crash recovery
# ═══════════════════════════════════════════════════════════════
checkpoint:
  enabled: true
  auto_save_interval: 5          # Save checkpoint every N jobs processed

# ═══════════════════════════════════════════════════════════════
# RATE LIMITER — Dynamic throttling with ban detection
# ═══════════════════════════════════════════════════════════════
rate_limiter:
  enabled: true
  base_delay_min: 3              # Minimum delay between actions (seconds)
  base_delay_max: 8              # Maximum delay between actions (seconds)

# ═══════════════════════════════════════════════════════════════
# METRICS — Prometheus-compatible endpoint
# ═══════════════════════════════════════════════════════════════
metrics:
  enabled: false
  port: 9090                     # Prometheus scrape port
  host: "0.0.0.0"

# ═══════════════════════════════════════════════════════════════
# JOB EVALUATION — Structured A-F evaluation per job
# ═══════════════════════════════════════════════════════════════
job_evaluation:
  enabled: true
  auto_evaluate: true            # Auto-evaluate after match scoring
  min_score_to_evaluate: 60      # Only evaluate jobs scoring above this
  save_reports: true             # Save full reports to data/reports/

# ═══════════════════════════════════════════════════════════════
# STORY BANK — Persistent STAR+R interview stories
# ═══════════════════════════════════════════════════════════════
story_bank:
  enabled: true
  auto_extract: true             # Auto-extract stories from evaluations
  max_stories: 50                # Cap total stories

# ═══════════════════════════════════════════════════════════════
# ARCHETYPE CLASSIFIER — Job type classification
# ═══════════════════════════════════════════════════════════════
archetype_classifier:
  enabled: true
  custom_archetypes: {}          # Override/extend default archetypes

# ═══════════════════════════════════════════════════════════════
# PORTFOLIO EVALUATOR — Score project ideas for job search
# ═══════════════════════════════════════════════════════════════
portfolio_evaluator:
  enabled: true

# ═══════════════════════════════════════════════════════════════
# TRAINING EVALUATOR — Course/cert ROI scoring
# ═══════════════════════════════════════════════════════════════
training_evaluator:
  enabled: true

# ═══════════════════════════════════════════════════════════════
# DEEP RESEARCH — 6-axis company intelligence
# ═══════════════════════════════════════════════════════════════
deep_research:
  enabled: true
  auto_research: false           # Auto-research after evaluation (uses many AI tokens)

# ═══════════════════════════════════════════════════════════════
# CV TEMPLATE — ATS-optimized HTML→PDF CV generation
# ═══════════════════════════════════════════════════════════════
cv_template:
  enabled: true
  output_dir: "data/cv_output"
  inject_keywords: true          # Auto-inject JD keywords into CV

# ═══════════════════════════════════════════════════════════════
# PIPELINE MANAGER — Application lifecycle state machine
# ═══════════════════════════════════════════════════════════════
pipeline_manager:
  enabled: true
  auto_ghost_days: 14            # Auto-mark as ghosted after N days
  enforce_transitions: true      # Enforce valid state transitions

# ═══════════════════════════════════════════════════════════════
# INTERVIEW SIMULATOR — Conversational AI interview practice
# ═══════════════════════════════════════════════════════════════
interview_simulator:
  enabled: true
  questions_per_session: 6       # Number of questions per mock interview
  include_follow_ups: true       # AI asks probing follow-up questions

# ═══════════════════════════════════════════════════════════════
# OFFER WAR ROOM — Multi-offer comparison & negotiation
# ═══════════════════════════════════════════════════════════════
offer_war_room:
  enabled: true
  projection_years: 5            # Years for earnings projection
  default_weights:               # Dimension weights for comparison
    total_comp: 30
    growth: 20
    culture: 15
    location: 15
    visa: 10
    work_life: 10

# ═══════════════════════════════════════════════════════════════
# APPLICATION FORENSICS — Pattern analysis across applications
# ═══════════════════════════════════════════════════════════════
application_forensics:
  enabled: true
  min_applications: 20           # Minimum data points before analysis

# ═══════════════════════════════════════════════════════════════
# GHOST PREDICTOR — Ghost risk scoring before applying
# ═══════════════════════════════════════════════════════════════
ghost_predictor:
  enabled: true
  warn_threshold: 0.7            # Warn when ghost probability exceeds this

# ═══════════════════════════════════════════════════════════════
# MARKET PULSE — Real-time job market intelligence
# ═══════════════════════════════════════════════════════════════
market_pulse:
  enabled: true
  snapshot_interval_days: 7      # How often to capture market snapshots

# ═══════════════════════════════════════════════════════════════
# EMPLOYER SLA — Response time tracking per company
# ═══════════════════════════════════════════════════════════════
employer_sla:
  enabled: true
  overdue_multiplier: 1.5        # Flag as overdue at Nx the company's average

# ═══════════════════════════════════════════════════════════════
# QUALITY GATE — Application quality scoring before submit
# ═══════════════════════════════════════════════════════════════
quality_gate:
  enabled: true
  min_quality_score: 50          # Minimum quality to proceed (0-100)
  block_below_threshold: false   # true = block weak apps, false = warn only

# ═══════════════════════════════════════════════════════════════
# CAREER SIMULATOR — Career path projection & comparison
# ═══════════════════════════════════════════════════════════════
career_simulator:
  enabled: true
  projection_years: 5            # Years to project forward

# ═══════════════════════════════════════════════════════════════
# PLUGINS — Community extensions
# ═══════════════════════════════════════════════════════════════
plugins:
  enabled: true
  disabled: []                   # List of plugin names to skip loading
