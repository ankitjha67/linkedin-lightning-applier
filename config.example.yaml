# ═══════════════════════════════════════════════════════════════
# LinkedIn Lightning Applier v2 — Config for Ankit Kumar
# Optimized from CV analysis
# ═══════════════════════════════════════════════════════════════

linkedin:
  email: ""                            # ← FILL YOUR EMAIL
  password: ""                         # ← FILL YOUR PASSWORD

personal:
  first_name: "John"
  last_name: "Doe"
  full_name: "John Doe"
  email: ""
  phone: "+91 9876543210"
  city: "Gurugram"
  state: "Haryana"
  zip_code: "122001"
  country: "India"
  linkedin_headline: "Manager – Financial Services Risk Management @ EY | Basel III/IRB | PD/LGD/EAD | RWA | OFSAA"

# ═══════════════════════════════════════════════════════════════
# JOB SEARCH
# ═══════════════════════════════════════════════════════════════
search:
  search_terms:
    # Tier 1 — exact match to your skills
    - "Credit Risk Manager"
    - "Risk Management Manager"
    - "Basel III"
    - "Credit Risk Analyst"
    - "IRB Risk"
    # Tier 2 — adjacent roles
    - "Regulatory Risk Manager"
    - "OFSAA Consultant"
    - "RWA Analyst"
    - "Capital Adequacy"
    - "Model Validation Analyst"

  search_locations:
    # Tier 1 — major finance hubs with visa paths
    - "London, England, United Kingdom"
    - "Singapore"
    - "Toronto, Ontario, Canada"
    - "Dubai, United Arab Emirates"
    - "Sydney, New South Wales, Australia"
    # Tier 2 — India
    - "Gurugram, Haryana, India"
    - "Mumbai, Maharashtra, India"
    - "Bangalore, Karnataka, India"
    # Tier 3 — other finance hubs
    - "Hong Kong SAR"
    - "Frankfurt, Hessen, Germany"
    - "Abu Dhabi, United Arab Emirates"

  date_posted: "Past hour"
  sort_by: "Most recent"
  easy_apply_only: true
  experience_level: ["Mid-Senior level", "Associate"]
  job_type: ["Full-time"]
  work_location: []
  randomize_order: true

# ═══════════════════════════════════════════════════════════════
# APPLICATION DEFAULTS
# ═══════════════════════════════════════════════════════════════
application:
  years_of_experience: 7
  notice_period_days: "30"
  desired_salary: "Negotiable"
  current_ctc: "20000"
  require_visa: "Yes"
  authorized_to_work: "Yes"
  willing_to_relocate: "Yes"

